services:
  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ciuser
      POSTGRES_PASSWORD: cipassword
      POSTGRES_DB: cidb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciuser -d cidb"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: sh /app/scripts/start-api.sh
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql+psycopg2://ciuser:cipassword@db:5432/cidb
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
