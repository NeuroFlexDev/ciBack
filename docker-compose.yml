services:
  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ciuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cidb}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ciuser} -d ${POSTGRES_DB:-cidb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      ENV: ${ENV:-dev}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ciuser}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-cidb}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    depends_on:
      db:
        condition: service_healthy
  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
      - uploads_data:/data/uploads
    ports:
      - "8000:8000"
    environment:
      ENV: ${ENV:-dev}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ciuser}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-cidb}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      JWT_ALG: ${JWT_ALG:-HS256}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_MINUTES: ${REFRESH_TOKEN_TTL_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      HUGGINGCHAT_PROXY_URL: ${HUGGINGCHAT_PROXY_URL:-http://ml-proxy:8001}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODEL: ${HF_MODEL:-}
      HF_MODEL_CANDIDATES: ${HF_MODEL_CANDIDATES:-}
      HF_API_URL: ${HF_API_URL:-}
      GIGA_CLIENT_ID: ${GIGA_CLIENT_ID:-}
      GIGA_CLIENT_SECRET: ${GIGA_CLIENT_SECRET:-}
      GIGA_SCOPE: ${GIGA_SCOPE:-GIGACHAT_API_PERS}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
  uploads_data:
